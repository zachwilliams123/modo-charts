<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synchronous vs inverter-based generation mix</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.35.0/plotly.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; background:#fff; }
.w { display:flex; flex-direction:column; width:100%; height:100%; padding:10px 16px 8px 16px; }
.chart-header { margin-bottom:2px; }
h1 { font-size:17px; font-weight:400; line-height:1.3; color:#333; margin:0; }
h1 b { font-weight:700; }
.sub { font-size:11px; color:#4a4a4a; margin-top:2px; line-height:1.3; }
.hleg { display:flex; gap:16px; margin:4px 0 2px; }
.hli { display:flex; align-items:center; gap:5px; font-size:11px; color:#444; font-family:'DM Sans',sans-serif; }
.hls { width:11px; height:11px; border-radius:2px; flex-shrink:0; }
#chart { flex:1; min-height:0; width:100%; }
.footer { display:flex; justify-content:space-between; align-items:flex-end; padding-top:5px; gap:16px; }
.footer-left { display:flex; flex-direction:column; gap:2px; flex:1; }
.src { font-size:10px; color:#aaa; line-height:1.4; }
.note { font-size:10px; color:#aaa; line-height:1.4; }
.wm { font-size:22px; font-weight:700; color:#333; letter-spacing:.25em; white-space:nowrap; flex-shrink:0; text-transform:uppercase; }
</style>
</head>
<body>
<div class="w">
  <div class="chart-header">
    <h1>Synchronous generation is <b>falling in every market</b> as inverter-based capacity scales</h1>
    <div class="sub">Generation output (TWh) · GB, Germany, Spain · 2026–2035</div>
  </div>
  <div class="hleg">
    <div class="hli"><div class="hls" style="background:#467ee4;"></div><span>Synchronous</span></div>
    <div class="hli"><div class="hls" style="background:#81b1fe;"></div><span>Inverter-based</span></div>
  </div>
  <div id="chart"></div>
  <div class="footer">
    <div class="footer-left">
      <div class="src">Source: Modo Energy modelling</div>
      <div class="note">Synchronous = CCGT, coal, lignite, nuclear, hydro. Inverter-based = wind, solar PV, BESS.</div>
    </div>
    <div class="wm">MODOENERGY</div>
  </div>
</div>
<script>
const F = '"DM Sans", sans-serif';

// Updated data from Jan 2026 central scenario databooks
const fullSync = [161,145,144, null,null,null, 318,317,297, null,null,null, 149,144,115];
const fullInv  = [130,193,294, null,null,null, 278,385,543, null,null,null, 124,152,207];

function syncPct(s, i) { return Math.round(s/(s+i)*100); }

const annotations = [];
const xPositions = [0,1,2, 6,7,8, 12,13,14];
xPositions.forEach((xIdx) => {
  const s = fullSync[xIdx], iv = fullInv[xIdx];
  if (s == null) return;
  annotations.push({
    x: xIdx, y: s + iv + 8,
    xref: 'x', yref: 'y',
    text: `${syncPct(s,iv)}%`,
    showarrow: false,
    font: { size: 9, color: '#888', family: F },
    xanchor: 'center',
  });
});

['Great Britain','Germany','Spain'].forEach((name, i) => {
  const xCenter = [1, 7, 13][i];
  annotations.push({
    x: xCenter, y: 0.98,
    xref: 'x', yref: 'paper',
    text: name,
    showarrow: false,
    font: { size: 12, color: '#555', family: F }, xanchor: 'center' });
});

const data = [
  {
    x: Array.from({length:15},(_,i)=>i),
    y: fullInv,
    name: 'Inverter-based',
    type: 'bar',
    marker: { color: '#81b1fe' },
    hovertemplate: '%{y:.0f} TWh<extra>Inverter-based</extra>',
  },
  {
    x: Array.from({length:15},(_,i)=>i),
    y: fullSync,
    name: 'Synchronous',
    type: 'bar',
    marker: { color: '#467ee4' },
    hovertemplate: '%{y:.0f} TWh<extra>Synchronous</extra>',
  },
];

const layout = {
  font: { family: F, color: '#4a4a4a', size: 12 },
  paper_bgcolor: 'rgba(0,0,0,0)',
  plot_bgcolor: 'rgba(0,0,0,0)',
  margin: { t: 24, r: 10, b: 40, l: 36, pad: 0 },
  barmode: 'stack',
  bargap: 0.15,
  title: null,
  xaxis: {
    showgrid: false, showline: false,
    tickvals: [0,1,2, 6,7,8, 12,13,14],
    ticktext: ['2026','2030','2035', '2026','2030','2035', '2026','2030','2035'],
    tickfont: { size: 12, color: '#4a4a4a', family: F },
    tickcolor: 'rgba(0,0,0,0)',
    automargin: true,
    range: [-0.8, 14.8],
  },
  yaxis: {
    showgrid: false, showline: false,
    tickfont: { size: 12, color: '#4a4a4a', family: F },
    tickcolor: 'rgba(0,0,0,0)',
    zeroline: false, automargin: true,
    title: { text: 'TWh', font: { size: 11, color: '#4a4a4a' }, standoff: 8 },
  },
  showlegend: false,
  hovermode: 'closest',
  hoverlabel: { bgcolor: '#333', font: { family: F, size: 12, color: '#fff' }, bordercolor: '#333' },
  annotations,
  shapes: [
    { type:'line', x0:3.9, x1:3.9, y0:0, y1:1, xref:'x', yref:'paper', line:{ color:'#e8e8e8', width:1 } },
    { type:'line', x0:9.9, x1:9.9, y0:0, y1:1, xref:'x', yref:'paper', line:{ color:'#e8e8e8', width:1 } },
  ],
};

Plotly.newPlot('chart', data, layout, { responsive: true, displayModeBar: false });
window.addEventListener('resize', () => Plotly.Plots.resize('chart'));
</script>
</body>
</html>
