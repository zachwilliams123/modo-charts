<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GB synchronous capacity by region</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.35.0/plotly.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; background:#fff; }
.w { display:flex; flex-direction:column; width:100%; height:100%; padding:10px 16px 8px 16px; }
h1 { font-size:17px; font-weight:400; line-height:1.25; margin-bottom:2px; }
h1 b { font-weight:700; }
.sub { font-size:10px; color:#555; margin-bottom:4px; }
.legend { display:flex; flex-wrap:wrap; gap:4px 16px; margin-bottom:6px; }
.li { display:flex; align-items:center; gap:5px; font-size:10px; color:#444; font-family:'DM Sans',sans-serif; }
.ls { width:11px; height:11px; border-radius:2px; flex-shrink:0; }
#chart { flex:1; min-height:0; }
.footer { display:flex; justify-content:space-between; align-items:flex-end; padding-top:5px; }
.src { font-size:9px; color:#aaa; flex:1; line-height:1.45; }
.wm  { font-size:17px; font-weight:700; color:#333; letter-spacing:.25em; text-transform:uppercase; padding-left:14px; }
</style>
</head>
<body>
<div class="w">
  <h1>GB could lose <b>over half its synchronous capacity by 2035</b>, while BESS scales to 30 GW</h1>
  <div class="sub">CCGT + nuclear nameplate capacity (GW) by region · 2016–2052</div>
  <div id="hlegend" class="legend"></div>
  <div id="chart"></div>
  <div class="footer">
    <div class="src">Source: DESNZ DUKES 5.11 (2024); ELEXON BM PN (Jan 2026); GB CMR; DESNZ/Baringa (Feb 2024). ★ = NESO LT2029 zone.</div>
    <div class="wm">MODOENERGY</div>
  </div>
</div>
<script>
const F='"DM Sans",sans-serif';

// Years 2016-2052
const yrs=Array.from({length:37},(_,i)=>2016+i);

// Plant data — corrected for BM-active plants
// bm_only plants included in capacity (they're physically operating)
// Retirement years: BM-only use DESNZ 34yr from commission; Peterhead special case ~2028
const plantData=[
  // Scotland
  {r:'Scotland',mw:895, c:1976,ret:2022}, // Hunterston B nuclear
  {r:'Scotland',mw:1200,c:1988,ret:2023}, // Torness nuclear
  {r:'Scotland',mw:1180,c:1978,ret:2028}, // Peterhead — BM-active constraint plant, ~2028 estimate

  // North East
  {r:'North East',mw:1185,c:1983,ret:2027}, // Hartlepool nuclear

  // North West ★
  {r:'North West',mw:1060,c:1984,ret:2027}, // Heysham 1 nuclear
  {r:'North West',mw:1240,c:1988,ret:2027}, // Heysham 2 nuclear
  {r:'North West',mw:810, c:1994,ret:2028}, // Rocksavage
  {r:'North West',mw:884, c:2016,ret:2041}, // Carrington 15yr
  {r:'North West',mw:1380,c:2018,ret:2043}, // Connah's Quay 15yr

  // Yorkshire
  {r:'Yorkshire',mw:900, c:1994,ret:2015}, // Killingholme retired
  {r:'Yorkshire',mw:1365,c:1999,ret:2033}, // South Humber Bank — BM-active, 34yr from 1999
  {r:'Yorkshire',mw:735, c:1994,ret:2028}, // Keadby 1
  {r:'Yorkshire',mw:1252,c:2004,ret:2038}, // VPI Immingham
  {r:'Yorkshire',mw:1200,c:2000,ret:2034}, // Saltend
  {r:'Yorkshire',mw:1332,c:2013,ret:2047}, // West Burton CCGT
  {r:'Yorkshire',mw:840, c:2023,ret:2048}, // Keadby 2 15yr
  {r:'Yorkshire',mw:776, c:2026,ret:2051}, // Eggborough 15yr

  // East Midlands
  {r:'East Midlands',mw:445, c:1999,ret:2033}, // Cottam DC — BM-active, 34yr from 1999
  {r:'East Midlands',mw:819, c:1999,ret:2029}, // Sutton Bridge (30yr, no T-4)
  {r:'East Midlands',mw:950, c:2004,ret:2038}, // Spalding
  {r:'East Midlands',mw:1828,c:2010,ret:2044}, // Staythorpe

  // London
  {r:'London',mw:408,c:2004,ret:2038}, // Enfield

  // South Central ★
  {r:'South Central',mw:928, c:1983,ret:2021}, // Dungeness B nuclear — decommissioned
  {r:'South Central',mw:420, c:1993,ret:2027}, // Great Yarmouth — BM-active, 34yr from 1993
  {r:'South Central',mw:715, c:1993,ret:2027}, // Rye House
  {r:'South Central',mw:420, c:1993,ret:2027}, // Shoreham
  {r:'South Central',mw:735, c:1994,ret:2028}, // Little Barford
  {r:'South Central',mw:755, c:1995,ret:2029}, // Medway
  {r:'South Central',mw:1198,c:1995,ret:2029}, // Sizewell B nuclear
  {r:'South Central',mw:1450,c:1997,ret:2031}, // Didcot B
  {r:'South Central',mw:800, c:2002,ret:2036}, // Coryton
  {r:'South Central',mw:805, c:2001,ret:2035}, // Damhead Creek
  {r:'South Central',mw:1517,c:2011,ret:2045}, // Grain
  {r:'South Central',mw:898, c:2009,ret:2043}, // Marchwood
  {r:'South Central',mw:395, c:2000,ret:2035}, // Kings Lynn A 15yr

  // South Wales & West ★
  {r:'South Wales & West',mw:965, c:1976,ret:2022}, // Hinkley Point B nuclear
  {r:'South Wales & West',mw:520, c:2003,ret:2019}, // Baglan Bay
  {r:'South Wales & West',mw:375, c:1998,ret:2019}, // Barry
  {r:'South Wales & West',mw:1234,c:2000,ret:2034}, // Seabank
  {r:'South Wales & West',mw:905, c:2010,ret:2044}, // Langage
  {r:'South Wales & West',mw:850, c:2010,ret:2044}, // Severn Power
  {r:'South Wales & West',mw:2199,c:2012,ret:2046}, // Pembroke
];

const REGIONS=[
  {name:'Scotland',                col:'#4db8a4'},
  {name:'North East',              col:'#81b1fe'},
  {name:'North West ★',  col:'#27ac60', r:'North West'},
  {name:'Yorkshire',               col:'#a074fb'},
  {name:'East Midlands',           col:'#b4b2a9'},
  {name:'London',                  col:'#e59c58'},
  {name:'South Central ★',col:'#e85f37',r:'South Central'},
  {name:'South Wales & West ★',col:'#467ee4',r:'South Wales & West'},
];

const traces=[...REGIONS].reverse().map(reg=>{
  const rKey=reg.r||reg.name;
  const mwByYear=yrs.map(yr=>
    plantData.filter(p=>p.r===rKey&&p.c<=yr&&p.ret>=yr)
             .reduce((s,p)=>s+p.mw,0)/1000
  );
  return{
    name:reg.name,x:yrs,y:mwByYear.map(v=>+v.toFixed(2)),
    type:'scatter',mode:'none',fill:'tonexty',
    fillcolor:reg.col+'C8',line:{color:reg.col,width:0},
    stackgroup:'one',
    legendrank:1,
    marker:{symbol:'square',size:10,color:reg.col},
    hovertemplate:`<b>${reg.name}</b><br>%{x}: %{customdata} GW<extra></extra>`,
  };
});



Plotly.newPlot('chart',traces,{
  font:{family:F,size:11.5,color:'#4a4a4a'},
  paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',
  margin:{t:4,r:12,b:36,l:42,pad:0},
  xaxis:{showgrid:false,tickfont:{size:11},tickcolor:'rgba(0,0,0,0)',range:[2016,2052],dtick:4},
  yaxis:{title:{text:'GW',font:{size:11}},showgrid:true,gridcolor:'#EEEEEE',zeroline:false,tickfont:{size:11},range:[0,42]},
  showlegend:false,
  hovermode:'closest',
  hoverlabel:{bgcolor:'#222',font:{family:F,size:11.5,color:'#fff'},bordercolor:'#222'},
  shapes:[
    {type:'line',xref:'x',yref:'paper',x0:2026,x1:2026,y0:0,y1:1,line:{color:'#333',width:2}},
  ],
  annotations:[
    {x:2026,y:41,xref:'x',yref:'y',text:'2026',showarrow:false,
     font:{size:9,color:'#888',family:F},xanchor:'center'},


  ],
},{responsive:true,displayModeBar:false});
window.addEventListener('resize',()=>Plotly.Plots.resize('chart'));

// Build HTML legend
const legendEl = document.getElementById('hlegend');
[...REGIONS].reverse().forEach(reg=>{
  const item = document.createElement('div');
  item.className = 'li';
  const swatch = document.createElement('div');
  swatch.className = 'ls';
  const r=parseInt(reg.col.slice(1,3),16),g=parseInt(reg.col.slice(3,5),16),b=parseInt(reg.col.slice(5,7),16);
  swatch.style.background = 'rgba('+r+','+g+','+b+',0.85)';
  const label = document.createElement('span');
  label.textContent = reg.name;
  item.appendChild(swatch);
  item.appendChild(label);
  legendEl.appendChild(item);
});


</script>
</body>
</html>
